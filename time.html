<!DOCTYPE html>
<html lang="th" data-mode="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ความลับ 💘</title>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;500;700&family=Mitr:wght@400;500&family=Sriracha&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="time.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">← กลับหน้าหลัก</a>
        <div class="nav-right">
            <button class="mode-btn" id="modeToggle" aria-label="Toggle Theme"></button>
        </div>
    </nav>

    <main>
        <section class="hero">
            <div class="hero-inner">
                <span class="hero-badge">LOCKED 🔒</span>
                <h1 class="hero-title">ความลับ 💘</h1>
                
                <div class="glass-card locked-box">
                    <div class="lock-icon">🚫</div>
                    <h2>เข้าดูไม่ได้จ้า</h2>
                    <p>รอเป็นแฟนก่อนนะจะมาทำต่อให้<br>อิอิ เป็นแฟนกันมั้ย? ตอบมานะะะะ!</p>
                    
                    <div class="input-group">
                        <input type="text" id="answerInput" placeholder="พิมพ์คำตอบตรงนี้จ้ะ...">
                        <button id="sendBtn" class="btn-main btn-fill">ส่งคำตอบ 🚀</button>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <script src="time.js"></script>
</body>
</html>
